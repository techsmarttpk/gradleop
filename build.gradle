plugins {
    id 'application'
}

group = 'com.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.44.0'
    testImplementation 'org.testng:testng:7.12.0'
}

application {
    mainClass = 'com.example.Main'
}

test {
    useTestNG()
}